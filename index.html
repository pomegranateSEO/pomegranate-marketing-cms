<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomegranate pSEO v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Space Grotesk', 'sans-serif'],
              logo: ['Outfit', 'sans-serif'],
            },
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              destructive: {
                DEFAULT: "hsl(var(--destructive))",
                foreground: "hsl(var(--destructive-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Brand Colors - pomegranate palette */
        --colour-dark-start: #0f0508;
        --colour-dark-mid: #4c0519;
        --colour-dark-rise: #881337;
        --colour-accent-primary: #f43f5e;
        --colour-accent-secondary: #be123c;
        --colour-accent-soft: #fda4af;
        --colour-accent-tint: #ffe4e6;
        --colour-text-on-dark: #fff0f5;
        --colour-text-primary: #0b0b0b;
        --colour-bg-light: #fff7fa;
        --colour-accent-leaf-dark: #166534;
        --colour-accent-leaf-spring: #4ade80;
        --colour-accent-leaf-tint: #f0fdf4;

        /* Shadcn/ui Theme Variables - mapped to brand colors */
        --background: 340 60% 99%;
        --foreground: 340 20% 4%;
        --card: 0 0% 100%;
        --card-foreground: 340 20% 4%;
        --popover: 0 0% 100%;
        --popover-foreground: 340 20% 4%;
        /* Primary: pomegranate rose #f43f5e */
        --primary: 350 89% 60%;
        --primary-foreground: 0 0% 100%;
        --secondary: 340 30% 96%;
        --secondary-foreground: 340 20% 15%;
        --muted: 340 20% 96%;
        --muted-foreground: 340 10% 45%;
        --accent: 340 30% 96%;
        --accent-foreground: 340 20% 15%;
        --destructive: 0 84% 60%;
        --destructive-foreground: 0 0% 100%;
        --border: 340 20% 90%;
        --input: 340 20% 90%;
        --ring: 350 89% 60%;
        --radius: 0.5rem;

        /* Success color - leaf green */
        --success: 142 76% 36%;
        --success-foreground: 0 0% 100%;
      }

      body {
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        font-family: 'Inter', sans-serif;
      }

      /* Heading font override */
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
      }

      /* Brand logo font */
      .font-logo {
        font-family: 'Outfit', sans-serif;
      }

      /* Ensure focus visibility */
      *:focus-visible {
        outline: 2px solid hsl(var(--ring));
        outline-offset: 2px;
      }

      /* Reduced motion support */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "zod": "https://esm.sh/zod@^4.3.6",
    "clsx": "https://esm.sh/clsx@^2.1.1",
    "react-hook-form": "https://esm.sh/react-hook-form@^7.71.1",
    "tailwind-merge": "https://esm.sh/tailwind-merge@^3.4.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.93.1",
    "@hookform/resolvers/": "https://esm.sh/@hookform/resolvers@^5.2.2/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
